services:
  typedb:
    build:
      context: .
      dockerfile: Dockerfile
    image: n_ary_test/typedb:3
    container_name: n_ary_typedb
    restart: unless-stopped
    ports:
      - "1729:1729"   # gRPC (future driver clients)
      - "8000:8000"   # HTTP API (used by this project)
    volumes:
      - typedb_data:/opt/typedb/server/data
    healthcheck:
      test: ["CMD-SHELL", "typedb server status || exit 0"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Industry-standard property-graph baseline for the cross-episode leakage
  # comparison. FalkorDB speaks OpenCypher over the Redis RESP protocol.
  falkordb:
    image: falkordb/falkordb:latest
    container_name: n_ary_falkordb
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  typedb_data:
