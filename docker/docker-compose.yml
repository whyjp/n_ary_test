services:
  typedb:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: n_ary_test/typedb:3
    container_name: n_ary_typedb
    restart: unless-stopped
    ports:
      - "21729:1729"   # gRPC (future driver clients) — host +20000 to avoid clashes
      - "28000:8000"   # HTTP API (used by this project) — host +20000 to avoid clashes
    volumes:
      - typedb_data:/opt/typedb/server/data
    healthcheck:
      test: ["CMD-SHELL", "typedb server status || exit 0"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Industry-standard property-graph baseline for the cross-episode leakage
  # comparison. FalkorDB speaks OpenCypher over the Redis RESP protocol.
  falkordb:
    image: falkordb/falkordb:latest
    container_name: n_ary_falkordb
    restart: unless-stopped
    ports:
      - "26379:6379"   # host +20000 to avoid clashes

volumes:
  typedb_data:
